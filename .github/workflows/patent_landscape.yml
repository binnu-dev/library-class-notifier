name: Patent Landscape (weekly brief)

# Trigger: weekly, after the gazette drops (화·수 1회). Wednesday 00:00 UTC
# = 09:00 KST Wednesday. Also runnable on demand.
#
# Source is chosen by the PATENT_SOURCE repo variable (default: patentsview,
# the free path). For the lightweight setup you only need one secret —
# PATENTSVIEW_API_KEY. If no SMTP_* secrets are set the brief is printed to the
# Actions log instead of emailed, so it runs green with zero email setup.
on:
  schedule:
    - cron: '0 0 * * 3'
  workflow_dispatch:
    inputs:
      source:
        description: 'Data source'
        type: choice
        options: [demo, patentsview, bigquery]
        default: patentsview
      dry_run:
        description: 'Build & print the brief without sending email'
        type: boolean
        default: true
      lookback_days:
        description: 'Publication window length (days)'
        type: string
        default: '7'

jobs:
  weekly-brief:
    runs-on: ubuntu-latest
    env:
      PATENT_SOURCE: ${{ github.event.inputs.source || vars.PATENT_SOURCE || 'patentsview' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r patent_landscape/requirements.txt

      - name: Write GCP service account key
        if: env.PATENT_SOURCE == 'bigquery'
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          echo "$GCP_SA_KEY" > "${RUNNER_TEMP}/gcp-sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=${RUNNER_TEMP}/gcp-sa.json" >> "$GITHUB_ENV"

      - name: Run weekly patent landscape
        env:
          GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
          PATENTSVIEW_API_KEY: ${{ secrets.PATENTSVIEW_API_KEY }}
          EMBEDDING_BACKEND: ${{ vars.EMBEDDING_BACKEND || 'auto' }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          PATENT_EMAIL_TO: ${{ secrets.PATENT_EMAIL_TO }}
          PATENT_LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '7' }}
          PATENT_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python -m patent_landscape.main
