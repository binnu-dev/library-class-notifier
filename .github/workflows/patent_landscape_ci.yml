name: Patent Landscape CI

# Fast test job: runs the pipeline end-to-end with the in-memory fake source
# and the dependency-free hashing embedding backend, so no GCP credentials or
# heavy model downloads are needed.
on:
  push:
    paths:
      - 'patent_landscape/**'
      - '.github/workflows/patent_landscape_ci.yml'
  pull_request:
    paths:
      - 'patent_landscape/**'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test deps
        run: python -m pip install --upgrade pip pytest

      - name: Run tests
        env:
          EMBEDDING_BACKEND: hashing
        run: python -m pytest patent_landscape/tests -q
